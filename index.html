<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEB Stats Lab</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0E1116; --panel:#161B22; --panel-2:#1D2330; --line:#2A3140;
  --amber:#F2A93B; --amber-dim:#7A5A22; --crimson:#D6483F; --teal:#36C9B0;
  --ink:#ECEFF4; --ink-dim:#8B93A1; --court:#15301f;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;}
.wrap{max-width:960px;margin:0 auto;padding:28px 20px 80px;}

.scoreboard{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,#171C24,#11151B);border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin-bottom:22px;font-family:'IBM Plex Mono',monospace;flex-wrap:wrap;gap:8px;}
.sb-title{font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.08em;font-size:18px;color:var(--amber);text-transform:uppercase;}
.sb-steps{display:flex;gap:8px;font-size:11px;color:var(--ink-dim);letter-spacing:.05em;flex-wrap:wrap;}
.sb-step{padding:4px 9px;border:1px solid var(--line);border-radius:4px;background:none;color:var(--ink-dim);}
.sb-step:hover:not(.active){border-color:var(--amber);color:var(--amber);}
.sb-step.active{color:#0E1116;background:var(--amber);border-color:var(--amber);font-weight:600;}

h1.headline{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(26px,5vw,38px);margin:6px 0 4px;letter-spacing:-0.01em;}
.sub{color:var(--ink-dim);font-size:14px;margin-bottom:24px;line-height:1.5;}

.btn{cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:10px;padding:14px 16px;font-family:'Inter',sans-serif;font-size:14px;text-align:left;transition:border-color .15s,transform .1s;}
.btn:hover{border-color:var(--amber);transform:translateY(-1px);}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--ink-dim);background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12.5px;margin-bottom:18px;padding:0;letter-spacing:.03em;}
.back-btn:hover{color:var(--amber);}

.grid{display:grid;gap:12px;}
.grid.leagues{grid-template-columns:repeat(2,1fr);}
.grid.mode{grid-template-columns:repeat(2,1fr);max-width:520px;}
.grid.list{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}

.league-card .tag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--bg);background:var(--amber);padding:2px 7px;border-radius:3px;margin-bottom:8px;text-transform:uppercase;}
.league-card .tag.fem{background:var(--crimson);color:#fff;}
.league-card h3{font-family:'Oswald',sans-serif;font-size:19px;margin:0 0 4px;font-weight:600;}
.league-card p{margin:0;color:var(--ink-dim);font-size:12.5px;}

.mode-card{display:flex;flex-direction:column;align-items:flex-start;gap:6px;padding:24px 18px;}
.mode-card .icon{font-size:26px;}
.mode-card h3{font-family:'Oswald',sans-serif;font-size:18px;margin:0;font-weight:600;}
.mode-card p{margin:0;color:var(--ink-dim);font-size:12.5px;}

.entity-card{display:flex;flex-direction:column;gap:6px;}
.entity-card .name{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;}
.entity-card .meta{font-size:11.5px;color:var(--ink-dim);font-family:'IBM Plex Mono',monospace;}
.entity-card .badge{align-self:flex-start;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--teal);border:1px solid var(--teal);padding:1px 6px;border-radius:3px;letter-spacing:.04em;}
.entity-card .real{color:var(--amber);border-color:var(--amber);}

.sheet{background:linear-gradient(180deg,var(--panel),#12161D);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.sheet-head{padding:22px 24px;border-bottom:1px solid var(--line);background:repeating-linear-gradient(135deg,var(--court) 0 2px,#102718 2px 4px);position:relative;}
.sheet-head::before{content:"";position:absolute;inset:0;background:rgba(14,17,22,.78);}
.sheet-head > *{position:relative;}
.sheet-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--amber);letter-spacing:.08em;text-transform:uppercase;}
.sheet-name{font-family:'Oswald',sans-serif;font-size:clamp(22px,4vw,30px);font-weight:700;margin:4px 0;}
.sheet-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--ink-dim);font-family:'IBM Plex Mono',monospace;}
.sheet-body{padding:22px 24px;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:22px;}
.stat-cell{background:var(--panel-2);padding:13px 10px;text-align:center;}
.stat-cell .val{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:var(--amber);}
.stat-cell .lab{font-size:10px;color:var(--ink-dim);letter-spacing:.03em;text-transform:uppercase;margin-top:3px;}

h4.section-title{font-family:'Oswald',sans-serif;font-size:13.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-dim);margin:0 0 10px;display:flex;align-items:center;gap:8px;}
h4.section-title::after{content:"";flex:1;height:1px;background:var(--line);}

.adv-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px;}
.adv-row:last-child{border-bottom:none;}
.adv-row .name{color:var(--ink-dim);}
.adv-row .bar-wrap{display:flex;align-items:center;gap:10px;width:52%;}
.bar{flex:1;height:6px;background:var(--panel-2);border-radius:3px;overflow:hidden;}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--amber),var(--teal));}
.adv-row .num{font-family:'IBM Plex Mono',monospace;width:50px;text-align:right;color:var(--ink);flex-shrink:0;}

.chart-box{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:16px;margin:18px 0;}
.chart-box canvas{max-height:280px;}

.heatmap{overflow-x:auto;margin:14px 0;}
.heatmap table{border-collapse:collapse;width:100%;font-family:'IBM Plex Mono',monospace;font-size:11.5px;}
.heatmap th{text-align:left;color:var(--ink-dim);font-weight:500;padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap;}
.heatmap td{padding:7px 9px;text-align:center;color:#0E1116;font-weight:600;white-space:nowrap;}
.heatmap td.teamname{text-align:left;color:var(--ink);font-weight:500;background:none !important;font-family:'Inter',sans-serif;}

.note{margin-top:16px;padding:12px 14px;border:1px dashed var(--amber-dim);border-radius:8px;font-size:11.5px;color:var(--ink-dim);line-height:1.55;}
.note b{color:var(--amber);}
.note.confirmed{border-color:var(--teal);}
.note.confirmed b{color:var(--teal);}

.footer-note{margin-top:36px;font-size:11.5px;color:var(--ink-dim);line-height:1.6;border-top:1px solid var(--line);padding-top:16px;}
.footer-note a{color:var(--amber);}

.bio-card{display:flex;gap:16px;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;}
.bio-photo{width:84px;height:84px;border-radius:10px;object-fit:cover;background:var(--panel-2);border:1px solid var(--line);flex-shrink:0;}
.bio-photo-fallback{width:84px;height:84px;border-radius:10px;background:linear-gradient(135deg,var(--panel-2),#232A38);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:26px;color:var(--ink-dim);flex-shrink:0;}
.bio-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px 18px;flex:1;min-width:220px;}
.bio-item{font-size:12px;}
.bio-item .k{color:var(--ink-dim);font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:2px;}
.bio-item .v{color:var(--ink);}
.bio-item .v.na{color:var(--ink-dim);font-style:italic;}

.metric-link{cursor:pointer;border-bottom:1px dotted var(--ink-dim);}
.metric-link:hover{color:var(--amber);border-bottom-color:var(--amber);}

.modal-overlay{position:fixed;inset:0;background:rgba(5,7,10,.72);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.modal-box{background:var(--panel);border:1px solid var(--line);border-radius:12px;max-width:420px;width:100%;padding:22px;position:relative;}
.modal-box h4{font-family:'Oswald',sans-serif;color:var(--amber);font-size:17px;margin:0 0 10px;}
.modal-box p{font-size:13.5px;line-height:1.55;color:var(--ink);margin:0;}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--ink-dim);font-size:20px;cursor:pointer;line-height:1;}
.modal-close:hover{color:var(--amber);}

.compare-head{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;margin-bottom:6px;}
.compare-head .vs{font-family:'Oswald',sans-serif;color:var(--ink-dim);font-size:13px;text-align:center;}
.compare-player-card{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;}
.compare-player-card .name{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;}
.compare-player-card .meta{font-size:11px;color:var(--ink-dim);font-family:'IBM Plex Mono',monospace;}
table.compare-table{width:100%;border-collapse:collapse;font-size:13px;margin:6px 0;}
table.compare-table td, table.compare-table th{padding:9px 8px;border-bottom:1px solid var(--line);text-align:center;}
table.compare-table th{color:var(--ink-dim);font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.04em;}
table.compare-table td.metric-name{text-align:left;color:var(--ink-dim);font-size:12.5px;}
table.compare-table td.win{color:var(--teal);font-weight:700;font-family:'IBM Plex Mono',monospace;}
table.compare-table td.lose{color:var(--ink);font-family:'IBM Plex Mono',monospace;}
table.compare-table td.tie{color:var(--ink-dim);font-family:'IBM Plex Mono',monospace;}

.illustrative-tag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--bg);background:var(--ink-dim);padding:2px 7px;border-radius:3px;margin-left:8px;vertical-align:middle;}
.court-wrap{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start;}
.court-wrap svg{max-width:340px;width:100%;height:auto;flex-shrink:0;}
.zone-legend{flex:1;min-width:180px;font-size:12px;}
.zone-legend .zrow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px dashed var(--line);}
.zone-legend .zswatch{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.zone-legend .znum{margin-left:auto;font-family:'IBM Plex Mono',monospace;color:var(--amber);}

table.lineup-table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0;}
table.lineup-table th{text-align:left;color:var(--ink-dim);font-weight:500;padding:7px 8px;border-bottom:1px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;}
table.lineup-table td{padding:8px;border-bottom:1px solid var(--line);}
table.lineup-table td.pos{color:var(--teal);font-family:'IBM Plex Mono',monospace;font-weight:600;}
table.lineup-table td.neg{color:var(--crimson);font-family:'IBM Plex Mono',monospace;font-weight:600;}

table.pm-table{width:100%;border-collapse:collapse;font-size:11.5px;margin:10px 0;font-family:'IBM Plex Mono',monospace;}
table.pm-table th{text-align:left;color:var(--ink-dim);font-weight:500;padding:6px 7px;border-bottom:1px solid var(--line);font-size:10px;text-transform:uppercase;}
table.pm-table td{padding:6px 7px;border-bottom:1px solid var(--line);white-space:nowrap;}
table.pm-table td.pname{font-family:'Inter',sans-serif;white-space:normal;}
table.pm-table td.pm-pos{color:var(--teal);font-weight:600;}
table.pm-table td.pm-neg{color:var(--crimson);font-weight:600;}

@media (max-width:560px){
  .grid.leagues{grid-template-columns:1fr;}
  .grid.mode{grid-template-columns:1fr;}
}

.pdf-btn{display:inline-flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--amber);color:var(--amber);border-radius:8px;padding:8px 14px;font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;margin-left:auto;}
.pdf-btn:hover{background:var(--amber);color:var(--bg);}
.sheet-head-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}

@media print{
  :root{
    --bg:#ffffff; --panel:#ffffff; --panel-2:#f4f4f4; --line:#ccc;
    --ink:#111111; --ink-dim:#444444; --amber:#a05a00; --teal:#0e7c66; --crimson:#a3231d; --court:#eef6ee;
  }
  body{background:#fff;}
  .wrap{max-width:100%;padding:0;}
  .scoreboard, .back-btn, .no-print, #compareBar, #playerSearch, #compareToggle{display:none !important;}
  .sheet{border:1px solid #ccc;}
  .sheet-head{background:#f4f4f4;}
  .sheet-head::before{display:none;}
  .chart-box{break-inside:avoid;}
  .adv-row, .stat-grid, table{break-inside:avoid;}
  a{color:inherit;text-decoration:none;}
  .metric-link{border-bottom:none;}
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* =======================================================================
   FEB STATS LAB — fuentes de datos:
   - baloncestoenvivo.feb.es (equipos, medias oficiales de la temporada
     2025/26 por partido: PT, T2, T3, TL, rebotes, asistencias, pérdidas...
     y rankings individuales de puntos)
   - feb.es (composición oficial de las 4 competiciones 2025/26)
   - proballers.com (contexto de plantillas/jugadores)
   Los 4 Factores de Dean Oliver de cada equipo están calculados a partir
   de esas medias oficiales reales (eFG%, TOV%, tasa de rebote ofensivo
   propio, FT Rate). Cuando el marcador dice "real", el dato de puntos por
   partido procede directamente del ranking oficial. El resto de variables
   de caja (minutos, tiros, pérdidas, robos...) de cada jugador son un
   perfil modelado de forma realista para poder calcular con fórmulas
   estándar las métricas avanzadas solicitadas (eFG%, TS%, USG%, ORtg/DRtg,
   Net Rating, PER, AST%, TRB%, TOV%) — se marcan como "aprox." porque no
   hay box-score jugador a jugador público en estas fuentes.
======================================================================= */

// ---- Contexto de liga para fórmulas de jugador (aprox., basado en las medias reales de equipo) ----
const LEAGUE_CTX = { pace: 71, teamFGM: 27, teamTRB: 64 };

function computeAdvanced(p){
  const pts = (p.fgm-p.tpm)*2 + p.tpm*3 + p.ftm;
  const fga = p.fga, fgm = p.fgm, tpm = p.tpm, ftm = p.ftm, fta = p.fta;
  const poss = fga + 0.44*fta + p.tov;
  const efg = fga ? ((fgm+0.5*tpm)/fga*100) : 0;
  const ts = (fga+fta) ? (pts/(2*(fga+0.44*fta))*100) : 0;
  const usg = Math.min(38, (poss*(200/5))/(p.min*LEAGUE_CTX.pace)*100);
  const tovPct = poss ? (p.tov/poss*100) : 0;
  const astPct = Math.max(2, 100*p.ast/(((p.min/40)*LEAGUE_CTX.teamFGM)-fgm));
  const trb = p.oreb+p.dreb;
  const trbPct = Math.min(45, 100*trb*40/(p.min*LEAGUE_CTX.teamTRB));
  const ortg = poss ? (pts/poss*100) : 0;
  const drtg = 109 - (p.stl+p.blk)*2.3 + p.tov*0.4;
  const netrtg = ortg-drtg;
  const per = ((pts + trb*1.1 + p.ast*1.5 + p.stl*2 + p.blk*1.8 - p.tov*1.2 - (fga-fgm)*0.6 - (fta-ftm)*0.35) / p.min) * 30;
  return {pts,efg,ts,usg,tovPct,astPct,trbPct,ortg,drtg,netrtg,per,trb};
}

// ---- Posesiones y ritmo por equipo (calculado sobre datos reales de baloncestoenvivo.feb.es) ----
// Fórmula estándar: Poss = FGA - OREB + TOV + 0,44*FTA, aplicada a las medias reales de tiro/rebote/pérdida
// de cada equipo (fuente: estadisticas.aspx por competición, temporada 2025/26).
const POSS_DATA = {
  "Melilla Ciudad del Deporte":76.5,"Grupo Alega Cantabria":75.7,"Grupo Ureta Tizona Burgos":77.3,
  "HLA Alicante":74.4,"Leyma Coruña":77.8,"Alimerka Oviedo Baloncesto":77.2,"Caja Rural CB Zamora":78.7,
  "Inveready Gipuzkoa Basket":72.7,"Fibwi Mallorca Bàsquet Palma":75.7,"Palmer Basket Mallorca Palma":74.5,
  "Grupo Caesa Seguros FC Cartagena CB":76.0,"Hestia Menorca":72.6,"Súper Agropal Palencia":74.4,
  "Monbus Obradoiro":77.0,"Movistar Estudiantes":73.9,"Cloud.Gal Ourense Baloncesto":74.4,"Flexicar Fuenlabrada":76.1,
  "Perfumerías Avenida":68.9,"Casademont Zaragoza":73.7,"Hozono Global Jairis":67.6,"Valencia B.C.":72.6,
  "Durán Maquinaria Ensino":75.8,"CAB Estepona Jardín Costa del Sol":70.9,"Innova-TSN Leganés":77.7,"Spar Girona":72.3,
  "Recoletas Zamora":70.6,"Osés Construcción Ardoi":73.5,"Lima Horta Barcelona":73.8,
  "Alter Enersun Al-Qázeres Extremadura":71.7,"Unicaja Mijas":76.7,"Bosonit Unibasket":70.2,"Celta Femxa Zorka":70.5,
  "Bueno Arenas Albacete Basket":75.9,"Amics Castelló":77.0,"Class Basquet Sant Antoni":77.4
};
function getPoss(teamName){ return POSS_DATA[teamName] !== undefined ? POSS_DATA[teamName] : null; }

// ---- Generador de perfil de caja a partir de un PPG real confirmado ----
// Los puntos por partido (ppg) son reales (ranking oficial baloncestoenvivo.feb.es).
// El resto de variables de caja (tiros, minutos, rebotes, asistencias, robos, tapones, pérdidas)
// se generan con una heurística estándar y consistente para poder calcular las métricas avanzadas;
// no son cifras publicadas jugador a jugador por FEB.
function mkReal(name, team, pos, games, ppg){
  const ftm = ppg*0.18, restPts = ppg-ftm;
  const twoPtsPts = restPts*0.66, threePtsPts = restPts*0.34;
  const twoPM = twoPtsPts/2, threePM = threePtsPts/3;
  const twoPA = twoPM/0.50, threePA = threePM/0.34;
  const fta = ftm/0.78;
  return {
    real:true, name, team, pos:pos||'Jugador/a', nat:'', games, min: +(20+ppg*0.55).toFixed(1),
    fgm:+(twoPM+threePM).toFixed(2), fga:+(twoPA+threePA).toFixed(2), tpm:+threePM.toFixed(2), tpa:+threePA.toFixed(2),
    ftm:+ftm.toFixed(2), fta:+fta.toFixed(2),
    oreb:+(0.9+ppg*0.06).toFixed(1), dreb:+(1.8+ppg*0.13).toFixed(1),
    ast:+(1.2+ppg*0.11).toFixed(1), stl:+(0.6+ppg*0.03).toFixed(1), blk:+(0.15+ppg*0.015).toFixed(2),
    tov:+(0.9+ppg*0.07).toFixed(1)
  };
}

// ---- Media de liga (jugadores): calculada dinámicamente sobre los jugadores cargados de cada liga ----
// ---- Media winsorizada ----
// Recorta los valores extremos (por debajo del percentil p y por encima del 100-p) al propio
// límite del percentil antes de calcular la media, para que un dato atípico (p.ej. un jugador con
// muy pocos minutos o un partido puntual con cifras disparadas) no distorsione la media del grupo.
function winsorize(arr, trimPct=0.1){
  if(!arr.length) return [];
  const sorted=[...arr].sort((a,b)=>a-b);
  const n=sorted.length;
  const lowIdx=Math.floor(n*trimPct);
  const highIdx=Math.min(n-1, Math.ceil(n*(1-trimPct))-1);
  const lowVal=sorted[Math.max(0,lowIdx)];
  const highVal=sorted[Math.max(0,highIdx)];
  return arr.map(v=> v<lowVal?lowVal : v>highVal?highVal : v);
}
function winsorizedMean(arr, trimPct=0.1){
  if(!arr.length) return 0;
  const w=winsorize(arr, trimPct);
  return w.reduce((s,v)=>s+v,0)/w.length;
}

function leaguePlayerAvg(players){
  const advs = players.map(computeAdvanced);
  const wm = (arr)=>winsorizedMean(arr, 0.1);
  return {
    pts: wm(advs.map(a=>a.pts)), trb: wm(advs.map(a=>a.trb)),
    ast: wm(players.map(p=>p.ast)), stl: wm(players.map(p=>p.stl)),
    efg: wm(advs.map(a=>a.efg)), ts: wm(advs.map(a=>a.ts)), usg: wm(advs.map(a=>a.usg)), astPct: wm(advs.map(a=>a.astPct)),
    trbPct: wm(advs.map(a=>a.trbPct)), tovPct: wm(advs.map(a=>a.tovPct)), ortg: wm(advs.map(a=>a.ortg)), drtg: wm(advs.map(a=>a.drtg)), per: wm(advs.map(a=>a.per))
  };
}

// Media de liga de los 4 Factores, calculada como media aritmética simple a partir de los equipos con datos reales
// (la media winsorizada solo se aplica a las estadísticas de jugadores, no de equipos)
function leagueAvgFFComputed(teams){
  const withFF = teams.filter(t=>t.ff);
  if(!withFF.length) return null;
  const plainMean = (arr)=> arr.reduce((s,v)=>s+v,0)/arr.length;
  return {
    efg: plainMean(withFF.map(t=>t.ff.efg)),
    tov: plainMean(withFF.map(t=>t.ff.tov)),
    orb: plainMean(withFF.map(t=>t.ff.orb)),
    ftr: plainMean(withFF.map(t=>t.ff.ftr))
  };
}

// Media de los jugadores que ocupan la misma posición (real u estimada, ver nota en la ficha)
function positionAvg(players, pos){
  const group = players.filter(p=>p.pos===pos);
  if(!group.length) return null;
  return {n:group.length, ...leaguePlayerAvg(group)};
}

// ---- Convierte una fila real de proballers.com (medias de temporada) en un jugador completo ----
// Datos reales: pts, reb, ast, partidos jugados, minutos, %3P, %TC, %TL, rebotes ofensivos, robos, pérdidas, tapones.
// Como la fuente da porcentajes de tiro pero no el desglose exacto de intentos de 2/3, los intentos (fga/tpa)
// se reconstruyen matemáticamente a partir de esos % reales para que sean internamente consistentes.
function realFromRow(name, team, pts, reb, ast, games, min, tpPctRaw, fgPctRaw, ftPctRaw, oreb, stl, tov, blk){
  const fgPct = fgPctRaw/100, tpPct = (tpPctRaw||0)/100, ftPct = (ftPctRaw||0)/100;
  const ftm = pts*0.18;
  const fta = ftPct>0 ? ftm/ftPct : (ftm>0 ? ftm/0.7 : 0);
  const tpShare = tpPct>0.001 ? 0.32 : 0.03;
  const remainPts = Math.max(0, pts-ftm);
  const denom = 2*fgPct + tpShare*tpPct;
  const fga = denom>0 ? remainPts/denom : pts/2;
  const tpa = fga*tpShare;
  const tpm = tpa*tpPct;
  const fgm = fga*fgPct;
  return {
    real:true, name, team, pos:'Jugador/a', nat:'', games, min,
    fgm:+fgm.toFixed(2), fga:+fga.toFixed(2), tpm:+tpm.toFixed(2), tpa:+tpa.toFixed(2),
    ftm:+ftm.toFixed(2), fta:+fta.toFixed(2),
    oreb:+oreb.toFixed(2), dreb:+Math.max(0,reb-oreb).toFixed(2),
    ast:+ast.toFixed(2), stl:+stl.toFixed(2), blk:+blk.toFixed(2), tov:+tov.toFixed(2)
  };
}

// Heurística real basada en altura y perfil de rebotes/asistencias del propio jugador (no inventa datos,
// pero es una aproximación, no la posición oficial de la ficha del club).
function estimatePosition(heightCm, ast, reb){
  const h = heightCm || 195;
  if(ast >= 4) return 'Base';
  if(h >= 205 || reb >= 6) return 'Pívot';
  if(h >= 198) return 'Ala-Pívot';
  if(ast >= 2.3) return 'Base';
  if(h <= 190 && reb < 3) return 'Escolta';
  return 'Alero';
}

  p.pos = full ? full.pos : estimatePosition(h, p.ast, reb);
  p.posReal = !!full;

}

function ffColor(val,type){
  // devuelve color de fondo para heatmap (verde=mejor, rojo=peor) según el tipo de métrica
  const good = type==='tov' ? (100-val) : val; // menos pérdidas es mejor
  const scales = {efg:[35,60], tov:[60,90] /*ya invertido*/, orb:[15,40], ftr:[10,42]};
  const [lo,hi] = type==='tov' ? [10,40] : scales[type];
  let pct;
  if(type==='tov'){ pct = 1-((val-lo)/(hi-lo)); } else { pct = (val-lo)/(hi-lo); }
  pct = Math.max(0,Math.min(1,pct));
  const hue = 4 + pct*130; // rojo -> verde
  return `hsl(${hue},60%,42%)`;
}

function heatmapTable(teams){
  const rows = teams.filter(t=>t.ff);
  if(!rows.length) return '<div class="note">Todavía no hay datos de los 4 Factores confirmados para los equipos de esta liga en esta versión.</div>';
  let html = `<div class="heatmap"><table><thead><tr><th>Equipo</th><th>${metricLabel('eFG% (equipo)','eFG%')}</th><th>${metricLabel('TOV% (equipo)','TOV%')}</th><th>${metricLabel('ORB%','ORB%*')}</th><th>${metricLabel('FT Rate')}</th><th>PJ</th></tr></thead><tbody>`;
  rows.sort((a,b)=>b.ff.efg-a.ff.efg).forEach(t=>{
    html+=`<tr>
      <td class="teamname">${t.name}</td>
      <td style="background:${ffColor(t.ff.efg,'efg')}">${t.ff.efg.toFixed(1)}%</td>
      <td style="background:${ffColor(t.ff.tov,'tov')}">${t.ff.tov.toFixed(1)}%</td>
      <td style="background:${ffColor(t.ff.orb,'orb')}">${t.ff.orb.toFixed(1)}%</td>
      <td style="background:${ffColor(t.ff.ftr,'ftr')}">${t.ff.ftr.toFixed(1)}%</td>
      <td class="teamname">${t.ff.games}</td>
    </tr>`;
  });
  html+='</tbody></table></div><div class="note"><b>Mapa de calor:</b> verde = mejor valor relativo dentro de la muestra actual, rojo = peor. *ORB% aquí es una tasa de rebote ofensivo propio (OREB del equipo entre sus rebotes totales), no un ORB% ajustado al rival, porque esa granularidad no está publicada en abierto. Pincha el nombre de cualquier métrica de la cabecera para ver qué significa.</div>';
  return html;
}

function renderPlayerCards(grid, players){

    {label:'Triple arco superior', pct: tpShare*0.65, color:'#2F8FE0'}
  ];
  const total = zones.reduce((s,z)=>s+z.pct,0)||1;
  zones.forEach(z=>z.pct = z.pct/total*100);
  const legend = zones.map(z=>`<div class="zrow"><span class="zswatch" style="background:${z.color}"></span>${z.label}<span class="znum">${z.pct.toFixed(0)}%</span></div>`).join('');

      <path d="M55,80 A140,140 0 0 1 245,80" fill="none" stroke="${zones[3].color}" stroke-width="30" opacity="${0.25+zones[3].pct/140}"/>
      <circle cx="150" cy="230" r="8" fill="#ECEFF4"/>

    </svg>
    <div class="zone-legend">${legend}</div>

  <div class="note"><b>Nota:</b> mapa <b>ilustrativo</b>. FEB no publica en abierto coordenadas de tiro (x,y) por jugador/a en estas fuentes; la distribución de zonas está modelada a partir del reparto real de intentos de 2 y de 3 de este jugador/a, no de datos de seguimiento óptico reales.</div>`;

// FEB no publica en abierto el play-by-play con sustituciones ni el +/- por combinación de 5 jugadores,

function minutesColor(min){

  if(min<=19) return '#F0C419';     // amarillo: 15-19

}

function lineupsHTML(teamName, roster){
  const names = roster.length ? roster.map(p=>p.name) : ['Base (genérico)','Escolta (genérico)','Alero (genérico)','Ala-pívot (genérico)','Pívot (genérico)'];
  while(names.length<5) names.push(['Rotación A','Rotación B','Rotación C','Rotación D','Rotación E'][names.length]);
  // combinaciones simuladas deterministas (semilla en el nombre del equipo, para que sea estable)
  let seed = teamName.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  function rnd(){ seed = (seed*9301+49297)%233280; return seed/233280; }
  const combos = [];
  for(let i=0;i<4;i++){
    const shuffled = [...names].sort(()=>rnd()-0.5).slice(0,5);
    const net = ((rnd()*24)-10).toFixed(1);
    const minShare = (6+rnd()*9).toFixed(1);
    combos.push({five:shuffled, net, min:minShare});
  }
  combos.sort((a,b)=>b.net-a.net);
  let rows = combos.map(c=>`<tr><td>${c.five.join(', ')}</td><td>${c.min}%</td><td class="${c.net>=0?'pos':'neg'}">${c.net>=0?'+':''}${c.net}</td></tr>`).join('');
  return `<table class="lineup-table"><thead><tr><th>Quinteto (nombre y apellidos)</th><th>% min. jugados juntos</th><th>Net Rating</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="note"><b>Nota:</b> tabla <b>ilustrativa/simulada</b>. FEB no publica en abierto el play-by-play con marcas de sustitución ni el +/- por combinación de 5 jugadores en estas fuentes, así que no se puede calcular un Net Rating real por quinteto. Los nombres de los 5 jugadores de cada combinación sí son reales (de la plantilla cargada de este club); lo simulado es qué 5 concretos coinciden en pista y su Net Rating.</div>`;
}

  const logo1=teamLogo(t1.name), logo2=teamLogo(t2.name);

  function row(label, key, v1, v2, higherIsBetter=true, suffix='', decimals=1){
    let c1='tie', c2='tie';
    if(v1!==null && v2!==null && Math.abs(v1-v2) > 0.05){
      const t1wins = higherIsBetter ? v1>v2 : v1<v2;
      c1 = t1wins?'win':'lose'; c2 = t1wins?'lose':'win';
    }
    const lbl = key ? metricLabel(key, label) : label;
    const fmt=(v)=> v===null ? '—' : v.toFixed(decimals)+suffix;

    const leagueTeamsWithPoss = league.teams.filter(t=>getPoss(t.name)!==null);
    const leagueAvgPoss = leagueTeamsWithPoss.length ? leagueTeamsWithPoss.reduce((s,t)=>s+getPoss(t.name),0)/leagueTeamsWithPoss.length : null;
    const roster = league.players.filter(p=>p.team===team.name);
    const hasRealGame = team.name==='Spar Girona' || team.name==='Valencia B.C.';
    const teamLogoUrl = teamLogo(team.name);
    sheet.innerHTML=`
      <div class="sheet-head">
        <div class="sheet-head-top">
          <div style="display:flex;align-items:center;gap:14px;">
            ${teamLogoUrl?`<img src="${teamLogoUrl}" alt="" style="width:56px;height:56px;object-fit:contain;flex-shrink:0;background:rgba(255,255,255,.06);border-radius:8px;padding:4px;">`:''}
            <div>
              <div class="sheet-eyebrow">${league.name}</div>
              <div class="sheet-name">${team.name}</div>
            </div>
          </div>
          <button class="pdf-btn no-print" onclick="window.print()">📄 Descargar PDF</button>
        </div>
        <div class="sheet-meta">${league.sub}${ff?` · ${ff.games} partidos`:''}</div>
      </div>
      <div class="sheet-body">
        ${ff ? `
          <div class="stat-grid">
            <div class="stat-cell"><div class="val">${ff.pts.toFixed(1)}</div><div class="lab">Puntos/partido</div></div>
            ${ff.ast!==undefined?`<div class="stat-cell"><div class="val">${ff.ast.toFixed(1)}</div><div class="lab">Asist./partido</div></div>`:''}
            ${ff.treb!==undefined?`<div class="stat-cell"><div class="val">${ff.treb.toFixed(1)}</div><div class="lab">Rebotes/partido</div></div>`:''}
            ${poss?`<div class="stat-cell"><div class="val">${poss.toFixed(1)}</div><div class="lab">Posesiones/partido</div></div>`:''}
            <div class="stat-cell"><div class="val">${ff.games}</div><div class="lab">Partidos</div></div>
          </div>
          <h4 class="section-title">4 Factores de Dean Oliver</h4>
          <div class="chart-box"><canvas id="ffBarChart"></canvas></div>
          <div class="adv-row"><span class="name">eFG% — tiro efectivo</span>${bar(ff.efg,65)}</div>
          <div class="adv-row"><span class="name">TOV% — pérdidas por posesión</span>${bar(ff.tov,30)}</div>
          <div class="adv-row"><span class="name">ORB%* — rebote ofensivo propio</span>${bar(ff.orb,45)}</div>
          <div class="adv-row"><span class="name">FT Rate — tiros libres/tiros de campo</span>${bar(ff.ftr,45)}</div>
          <div class="note confirmed"><b>Dato real:</b> los 4 Factores están calculados directamente sobre las medias oficiales de equipo publicadas en baloncestoenvivo.feb.es (temporada 2025/26). *ORB% es una tasa de rebote ofensivo propio (no ajustada al rival, por no estar publicada esa granularidad).</div>

          ${poss?`
          <h4 class="section-title" style="margin-top:20px;">Posesiones, ritmo y rendimiento por cada 5 minutos</h4>
          <div class="adv-row"><span class="name">Ritmo (posesiones/partido, 40 min)${leagueAvgPoss?` <i style="color:var(--ink-dim);font-style:normal;">(media liga: ${leagueAvgPoss.toFixed(1)})</i>`:''}</span>${bar(poss,90)}</div>
          <div class="adv-row"><span class="name">Puntos por cada 5 min de juego</span>${bar(ff.pts/8,14)}</div>
          ${ff.ast!==undefined?`<div class="adv-row"><span class="name">Asistencias por cada 5 min</span>${bar(ff.ast/8,3)}</div>`:''}
          ${ff.treb!==undefined?`<div class="adv-row"><span class="name">Rebotes por cada 5 min</span>${bar(ff.treb/8,5)}</div>`:''}
          ${leagueAvgPoss?`<div class="note confirmed"><b>Media de la liga:</b> ${leagueAvgPoss.toFixed(1)} posesiones/partido, calculada sobre los ${leagueTeamsWithPoss.length} equipos de ${league.name} con datos confirmados. Este equipo juega ${poss>=leagueAvgPoss?'más rápido':'más despacio'} que la media (${(poss-leagueAvgPoss>=0?'+':'')}${(poss-leagueAvgPoss).toFixed(1)} posesiones).</div>`:''}
          <div class="note confirmed"><b>Dato real (calculado):</b> posesiones estimadas con la fórmula estándar Poss ≈ TCA − RO + BP + 0,44×TLA aplicada a las medias oficiales de equipo; el rendimiento "por cada 5 minutos" es ese mismo dato real repartido entre los 8 tramos de 5 minutos que tiene un partido de 40 minutos.</div>
          `:''}

          <h4 class="section-title" style="margin-top:20px;">Distribución de minutos · temporada 2025/26</h4>
          ${minutesChartHTML(roster)}

          <h4 class="section-title" style="margin-top:20px;">Quintetos · eficiencia por combinación de 5<span class="illustrative-tag">Ilustrativo</span></h4>
          ${lineupsHTML(team.name, roster)}
        ` : `<div class="note">Todavía no hay datos oficiales de equipo confirmados para este club en esta versión de la app. El club en sí es real y forma parte de la competición ${league.name} 2025/26 según feb.es.</div>`}

        ${hasRealGame ? `
          <h4 class="section-title" style="margin-top:20px;">Partido real analizado · impacto por jugadora (+/-)</h4>
          ${realGameHTML(REAL_GAME_LFENDESA, team.name)}
        ` : ''}
      </div>
    `;
    div.appendChild(sheet);

    if(ff){
      setTimeout(()=>{
        const ctx=document.getElementById('ffBarChart');
        const avgFFteam = leagueAvgFFComputed(league.teams) || {efg:0,tov:0,orb:0,ftr:0};
        chartRefs.push(new Chart(ctx,{
          type:'bar',
          data:{labels:['eFG%','TOV%','ORB%*','FT Rate'],
            datasets:[
              {label:team.name.split(' ')[0], data:[ff.efg,ff.tov,ff.orb,ff.ftr], backgroundColor:'#F2A93B'},
              {label:'Media liga', data:[avgFFteam.efg,avgFFteam.tov,avgFFteam.orb,avgFFteam.ftr], backgroundColor:'#36C9B0'}
            ]},
          options:{responsive:true, plugins:{legend:{labels:{color:'#8B93A1'}}}, scales:{x:{ticks:{color:'#8B93A1'},grid:{color:'#1D2330'}}, y:{ticks:{color:'#8B93A1'},grid:{color:'#1D2330'}}}}
        }));
      },0);
    }
    if(roster.length){
      setTimeout(()=>{
        const minCtx=document.getElementById('minutesChart');
        if(minCtx){
          const sorted=[...roster].filter(p=>p.min).sort((a,b)=>b.min-a.min);
          chartRefs.push(new Chart(minCtx,{
            type:'bar',
            data:{
              labels: sorted.map(p=>p.name),
              datasets:[{
                label:'Minutos/partido',
                data: sorted.map(p=>p.min),
                backgroundColor: sorted.map(p=>minutesColor(p.min))
              }]
            },
            options:{
              responsive:true, maintainAspectRatio:false,
              plugins:{legend:{display:false}, tooltip:{callbacks:{label:(c)=>c.parsed.y.toFixed(1)+' min/partido'}}},
              scales:{
                x:{ticks:{color:'#ECEFF4',font:{size:10},autoSkip:false,maxRotation:80,minRotation:60},grid:{display:false}},
                y:{ticks:{color:'#8B93A1'},grid:{color:'#1D2330'}, title:{display:true,text:'Minutos por partido',color:'#8B93A1'}}
              }
            }
          }));
        }
      },0);
    }
    if(hasRealGame){
      setTimeout(()=>{
        const g=REAL_GAME_LFENDESA;
        const ctx=document.getElementById('quarterChart');
        if(ctx){
          const diff = g.home.quarters.map((q,i)=>q-g.away.quarters[i]);
          chartRefs.push(new Chart(ctx,{
            type:'bar',
            data:{labels:['C1','C2','C3','C4'],
              datasets:[{label:`Diferencia ${g.home.name} - ${g.away.name} por cuarto`, data:diff, backgroundColor:diff.map(d=>d>=0?'#36C9B0':'#D6483F')}]},
            options:{responsive:true, plugins:{legend:{labels:{color:'#8B93A1'}}}, scales:{x:{ticks:{color:'#8B93A1'},grid:{color:'#1D2330'}}, y:{ticks:{color:'#8B93A1'},grid:{color:'#1D2330'}}}}
          }));
        }
      },0);
    }
  }
  return div;
}

render();
</script>
</body>
</html>
